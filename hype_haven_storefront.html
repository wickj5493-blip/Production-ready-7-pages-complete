
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; }
.store { font-family: 'DM Sans', sans-serif; color: #111111; }
.nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 0.5px solid var(--color-border-tertiary); background: #fff; position: sticky; top: 0; z-index: 10; }
.nav-logo { font-size: 18px; font-weight: 500; color: #6c47ff; letter-spacing: -0.5px; }
.nav-tag { font-size: 11px; color: var(--color-text-secondary); letter-spacing: 0.5px; text-transform: uppercase; }
.nav-cart { background: #6c47ff; color: #fff; border: none; border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; }
.hero { background: #6c47ff; color: #fff; padding: 48px 24px; text-align: center; }
.hero h1 { font-size: 36px; font-weight: 500; letter-spacing: -1px; margin-bottom: 8px; }
.hero p { font-size: 14px; opacity: 0.75; letter-spacing: 1px; text-transform: uppercase; }
.section { padding: 32px 24px; }
.section-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: #6c47ff; }
.card-img { background: #f5f3ff; height: 160px; display: flex; align-items: center; justify-content: center; }
.card-img-inner { width: 64px; height: 64px; background: #6c47ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.card-img-inner span { font-size: 28px; }
.card-body { padding: 14px; }
.card-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; line-height: 1.3; }
.card-sku { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 10px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.price { font-size: 16px; font-weight: 500; color: #6c47ff; }
.variants { display: flex; gap: 4px; flex-wrap: wrap; }
.variant { font-size: 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 5px; color: var(--color-text-secondary); }
.badge { display: inline-block; font-size: 10px; background: #ede9ff; color: #6c47ff; border-radius: 4px; padding: 2px 7px; margin-bottom: 8px; }
.add-btn { width: 100%; margin-top: 12px; background: #6c47ff; color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.add-btn:hover { opacity: 0.88; }
.add-btn.added { background: #1d9e75; }
.footer { border-top: 0.5px solid var(--color-border-tertiary); padding: 24px; text-align: center; }
.footer p { font-size: 12px; color: var(--color-text-secondary); }
.cart-count { background: #fff; color: #6c47ff; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<div class="store">
  <nav class="nav">
    <div>
      <div class="nav-logo">Hype Haven</div>
      <div class="nav-tag">Drop culture. Elevated.</div>
    </div>
    <button class="nav-cart" onclick="showCart()">
      Bag <span class="cart-count" id="cart-count">0</span>
    </button>
  </nav>

  <div class="hero">
    <h1>New Drops</h1>
    <p>Limited quantities — cop fast</p>
  </div>

  <div class="section">
    <div class="section-label">All products</div>
    <div class="grid" id="product-grid"></div>
  </div>

  <div class="footer">
    <p>Hype Haven &mdash; All items are dropshipped via MN+LA &mdash; Free shipping on orders over ₱2,000</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:"prod_1775615427672", title:"Classic Tee in Caviar", price:23.2, sku:"MN-CT-CAV", variants:["XS","S","M","L","XL","2XL"] },
  { id:"prod_1775615430416", title:"Bloom Tee in Heather Grey", price:25.89, sku:"MN-BL-HGR", variants:["S","M","L","XL"] },
  { id:"prod_1775615431192", title:"DF & Harmony Tee (Black)", price:28.39, sku:"MN-DFH-BLK", variants:["S","M","L","XL","2XL"] },
  { id:"prod_1775615431808", title:"DF & Harmony Tee (White)", price:28.39, sku:"MN-DFH-WHT", variants:["S","M","L","XL"] }
];

const emojis = ["🖤","🩶","🖤","🤍"];
let cart = {};

function renderProducts() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = products.map((p, i) => `
    <div class="card">
      <div class="card-img">
        <div class="card-img-inner"><span>${emojis[i]}</span></div>
      </div>
      <div class="card-body">
        <div class="badge">Dropship</div>
        <div class="card-title">${p.title}</div>
        <div class="card-sku">${p.sku}</div>
        <div class="card-footer">
          <div class="price">$${p.price.toFixed(2)}</div>
          <div class="variants">${p.variants.slice(0,4).map(v=>`<span class="variant">${v}</span>`).join('')}${p.variants.length>4?`<span class="variant">+${p.variants.length-4}</span>`:''}</div>
        </div>
        <button class="add-btn" id="btn-${p.id}" onclick="addToCart('${p.id}', '${p.title}')">Add to bag</button>
      </div>
    </div>
  `).join('');
}

function addToCart(id, title) {
  cart[id] = (cart[id] || 0) + 1;
  const total = Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('cart-count').textContent = total;
  const btn = document.getElementById('btn-'+id);
  btn.textContent = 'Added!';
  btn.classList.add('added');
  setTimeout(() => { btn.textContent = 'Add to bag'; btn.classList.remove('added'); }, 1200);
  showToast(`${title} added to bag`);
}

function showCart() {
  const total = Object.values(cart).reduce((a,b)=>a+b,0);
  if (total === 0) { showToast('Your bag is empty'); return; }
  const items = products.filter(p => cart[p.id]).map(p => `${cart[p.id]}x ${p.title}`).join(', ');
  sendPrompt(`My current cart: ${items}. Can you help me review my order before checkout?`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderProducts();
</script>
